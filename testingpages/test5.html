<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }
    body{
        background: #f5f5f5;
    }
    .navbar{
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #111827;
        padding: 15px 40px;
    }
    .logo{
        color: #f5f5f5;
        font-size: 24px;
        font-weight: bold;
    }
    .nav{
        list-style: none;
        display: flex;
        gap: 25px;
    }
    .nav li a{
        text-decoration: none;
        color: #f5f5f5;
        font-size: 16px;
        transition: 0.3s;
    }
    .nav li a:hover{
        color: #f59e0b;
        content: "";
        width: 0;
        height: 2px;
        background-color: #f08804; /* Amazon orange */
        bottom: -5px;
        left: 0;
        transition: width 0.3s ease-in-out;
    }
</style>
<body>
    <div class="navbar">
        <div class="logo">My Website</div>
        <ul class="nav">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </div>
    <a href="#" class="btn">Login</a>
</body>
</html>
