<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodingPani</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

.main{
width:100%;
height:100vh;
background:linear-gradient(to top,rgba(0,0,0,0.5),rgba(0,0,0,0.5)),url(images/1.jpg);
background-position:center;
background-size:cover;
}

/* NAVBAR */

.navbar{
width:90%;
margin:auto;
height:75px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
color:#ff7200;
font-size:35px;
}

.menu ul{
display:flex;
list-style:none;
}

.menu ul li{
margin:0 20px;
}

.menu ul li a{
color:white;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.menu ul li a:hover{
color:#ff7200;
}

/* SEARCH */

.search{
display:flex;
}

.sch{
width:200px;
height:35px;
background:transparent;
border:1px solid #ff7200;
color:white;
padding:5px;
border-right:none;
}

.btn{
height:35px;
background:#ff7200;
border:none;
color:white;
padding:0 15px;
cursor:pointer;
}

/* CONTENT */

.content{
width:90%;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
height:80%;
color:white;
}

.text{
max-width:500px;
}

.text h1{
font-size:50px;
}

.text span{
color:#ff7200;
}

.para{
margin:20px 0;
line-height:1.6;
}

.cn{
width:160px;
height:40px;
background:#ff7200;
border:none;
color: #fff;
border-radius:10px;
cursor:pointer;
font-size:18px;
transition: .4s ease;
}

.cn a{
text-decoration:none;
color:black;
font-weight:bold;
transition: .4s ease;
}

/* LOGIN FORM */

.form{
width:280px;
background:rgba(0,0,0,0.8);
padding:25px;
border-radius:10px;
}

.form h2{
text-align:center;
color:#ff7200;
background:white;
padding:8px;
border-radius:10px;
margin-bottom:20px;
}

.form input{
width:100%;
padding:10px;
margin-top:15px;
background:transparent;
border:none;
border-bottom:1px solid #ff7200;
color:white;
}

.form input::placeholder{
color:white;
}

.btnn{
width:100%;
height:40px;
background:#ff7200;
border:none;
border-radius:10px;
margin-top:20px;
color:white;
font-size:16px;
cursor:pointer;
}

.link{
text-align:center;
margin-top:15px;
}

.link a{
color:#ff7200;
text-decoration:none;
}

.liw{
text-align:center;
margin-top:15px;
}

.icons{
display:flex;
justify-content:center;
margin-top:10px;
}

.icons a{
color:white;
font-size:22px;
margin:0 8px;
}
/* ============================= */
/* Animated Buttons */
/* ============================= */

.cn, .btnn{
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
}

.cn:hover, .btnn:hover{
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

/* Shine animation */

.cn::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.3);
    transition:0.5s;
}

.cn:hover::before{
    left:100%;
}

/* ============================= */
/* Smooth Navbar Hover */
/* ============================= */

.menu ul li a{
    position:relative;
    color:white;
    text-decoration:none;
    font-weight:bold;
    padding:5px 0;
    transition:0.3s;
}

.menu ul li a::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    left:0;
    bottom:-3px;
    background:#ff7200;
    transition:0.4s;
}

.menu ul li a:hover{
    color:#ff7200;
}

.menu ul li a:hover::after{
    width:100%;
}

/* ============================= */
/* Mobile Responsive Design */
/* ============================= */

@media (max-width:900px){

.navbar{
flex-direction:column;
height:auto;
}

.menu ul{
flex-direction:column;
margin-top:10px;
}

.menu ul li{
margin:10px 0;
}

.search{
margin-top:10px;
}

.content{
flex-direction:column;
text-align:center;
}

.form{
margin-top:40px;
}

.text h1{
font-size:35px;
}

}
</style>

</head>

<body>

<div class="main">

<div class="navbar">

<h2 class="logo">CodingPani</h2>

<div class="menu">
<ul>
<li><a href="#">HOME</a></li>
<li><a href="#">ABOUT</a></li>
<li><a href="#">SERVICE</a></li>
<li><a href="#">DESIGN</a></li>
<li><a href="#">CONTACT</a></li>
</ul>
</div>

<div class="search">
<input class="sch" type="search" placeholder="Type Here">
<button class="btn">Search</button>
</div>

</div>

<div class="content">

<div class="text">

<h1>Web Design & <br><span>Development</span> <br>Course</h1>

<p class="para">
Web Design is a specialisation of the design stream.
They also use HTML, CSS and WYSIWYG editing software
to create design elements.
</p>

<button class="cn"><a href="#">JOIN US</a></button>

</div>

<div class="form">

<h2>Login Here</h2>

<input type="email" placeholder="Enter Email Here">
<input type="password" placeholder="Enter Password Here">

<button class="btnn">Login</button>

<p class="link">
Don't have an account?<br>
<a href="#">Sign up</a>
</p>

<p class="liw">Log in With</p>

<div class="icons">
<a href="#"><ion-icon name="logo-facebook"></ion-icon></a>
<a href="#"><ion-icon name="logo-google"></ion-icon></a>
<a href="#"><ion-icon name="logo-twitter"></ion-icon></a>
<a href="#"><ion-icon name="logo-github"></ion-icon></a>
<a href="#"><ion-icon name="logo-linkedin"></ion-icon></a>
</div>

</div>

</div>

</div>

<script src="https://unpkg.com/ionicons@5.4.0/dist/ionicons.js"></script>

</body>
</html>
