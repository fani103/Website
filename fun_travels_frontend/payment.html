<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | FlyTravels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 28px;
            margin-bottom: 20px;
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        .trip-detail {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 15px;
        }
        .total-box {
            background: #e9ecef;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            margin: 20px 0;
        }
        .pay-btn {
            width: 100%;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .error {
            color: red;
            font-size: 13px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>💳 Passenger & Payment</h2>
            <div id="tripInfo" class="trip-detail"></div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter passenger name" value="Guest User">
            </div>
            <div class="form-group">
                <label>Email (for booking)</label>
                <input type="email" id="email" placeholder="your@email.com" value="guest@flytravels.com">
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="mobile" placeholder="9876543210" value="9876543210">
            </div>

            <div class="total-box">
                <strong>💰 GRAND TOTAL:</strong> ₹<span id="totalAmount">0</span>
            </div>

            <button class="pay-btn" id="confirmPayBtn">✅ CONFIRM & PAY</button>
        </div>
    </div>

    <script>
        function getLS(key, defaultValue = null) {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : defaultValue;
            } catch { return defaultValue; }
        }
        function setLS(key, value) {
            localStorage.setItem(key, JSON.stringify(value));
        }

        const draft = getLS('ft_payment_draft');
        
        if (!draft || !draft.seats || draft.seats.length === 0) {
            alert('Invalid booking session. Please start over.');
            window.location.href = 'index.html';
        }

        // Display trip info
        document.getElementById('tripInfo').innerHTML = `
            <strong>${draft.busName}</strong> (${draft.busType})<br>
            🪑 Seats: ${draft.seats.join(', ')}<br>
            💵 ₹${draft.price} × ${draft.seats.length} seats = ₹${draft.totalAmount}
        `;
        document.getElementById('totalAmount').innerText = draft.totalAmount;

        document.getElementById('confirmPayBtn').addEventListener('click', () => {
            const name = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const mobile = document.getElementById('mobile').value.trim();

            if (!name) {
                alert('Please enter your name');
                return;
            }

            // Create final booking
            const finalBooking = {
                ...draft,
                passengerName: name,
                passengerEmail: email,
                passengerMobile: mobile,
                paymentDate: new Date().toISOString(),
                status: 'CONFIRMED'
            };

            // Save to bookings list
            const allBookings = getLS('ft_bookings', []);
            allBookings.push(finalBooking);
            setLS('ft_bookings', allBookings);

            // Update taken seats map
            let takenMap = getLS('ft_takenSeats', {});
            if (!takenMap[draft.busId]) takenMap[draft.busId] = [];
            takenMap[draft.busId] = [...new Set([...takenMap[draft.busId], ...draft.seats])];
            setLS('ft_takenSeats', takenMap);

            // Store last paid for success page
            setLS('ft_last_paid', finalBooking);

            // Clear draft
            localStorage.removeItem('ft_payment_draft');

            // Redirect to success
            window.location.href = 'success.html';
        });
    </script>
</body>
</html>
