<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed | FlyTravels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #28a745, #20c997);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            max-width: 450px;
            background: white;
            border-radius: 48px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .check-icon {
            font-size: 70px;
            background: #d4edda;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        h1 {
            color: #28a745;
            margin-bottom: 10px;
        }
        .booking-id {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 30px;
            font-family: monospace;
            margin: 20px 0;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
        }
        .btn-primary {
            background: #764ba2;
            color: white;
        }
        .btn-outline {
            border: 2px solid #764ba2;
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="check-icon">✅</div>
        <h1>Booking Confirmed!</h1>
        <p>Your ticket has been booked successfully.</p>

        <div id="bookingDetails" class="booking-id"></div>

        <div class="btn-group">
            <a href="mybookings.html" class="btn btn-primary">📋 My Bookings</a>
            <a href="index.html" class="btn btn-outline">🏠 New Search</a>
        </div>
    </div>

    <script>
        function getLS(key, defaultValue = null) {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : defaultValue;
            } catch { return defaultValue; }
        }

        const booking = getLS('ft_last_paid');
        if (!booking || !booking.bookingId) {
            document.getElementById('bookingDetails').innerHTML = '⚠️ No booking found';
        } else {
            document.getElementById('bookingDetails').innerHTML = `
                <strong>Booking ID:</strong> ${booking.bookingId}<br>
                🚌 ${booking.busName} | 🪑 ${booking.seats.join(', ')}<br>
                👤 ${booking.passengerName || 'Guest'}
            `;
        }
    </script>
</body>
</html>
