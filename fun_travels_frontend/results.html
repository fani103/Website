<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Bus & Seats | FlyTravels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background: #f0f2f5;
            padding: 20px;
            padding-bottom: 100px;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 28px;
            margin-bottom: 20px;
        }
        .bus-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .bus-name {
            font-size: 22px;
            font-weight: bold;
        }
        .bus-meta {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            color: #666;
            font-size: 14px;
        }
        .price {
            font-size: 24px;
            color: #764ba2;
            font-weight: bold;
        }
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 20px 0;
            max-width: 280px;
        }
        .seat {
            background: #e8e8e8;
            text-align: center;
            padding: 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            border: 2px solid transparent;
        }
        .seat.available {
            background: #d4edda;
            color: #155724;
            cursor: pointer;
        }
        .seat.selected {
            background: #764ba2;
            color: white;
            border-color: #4a2e6b;
        }
        .seat.taken {
            background: #f8d7da;
            color: #721c24;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .summary {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 15px;
            margin-top: 10px;
        }
        .continue-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }
        .back-link {
            text-align: center;
            margin-top: 15px;
        }
        .back-link a {
            color: #764ba2;
            text-decoration: none;
        }
        .loader {
            display: none;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div id="routeInfo">Loading...</div>
            <div id="dateInfo" style="font-size: 14px; opacity:0.9"></div>
        </div>

        <div id="busContainer"></div>
        <div class="back-link"><a href="index.html">← Modify Search</a></div>
    </div>

    <script>
        function getLS(key, defaultValue = null) {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : defaultValue;
            } catch { return defaultValue; }
        }
        function setLS(key, value) {
            localStorage.setItem(key, JSON.stringify(value));
        }

        // Sample bus data
        const busDatabase = {
            bus101: { id: "bus101", name: "🟢 FlyExpress", type: "AC Sleeper", departure: "06:30 AM", arrival: "11:45 AM", price: 450, totalSeats: 20 },
            bus102: { id: "bus102", name: "🔵 CityLink", type: "AC Seater", departure: "08:00 AM", arrival: "01:15 PM", price: 380, totalSeats: 20 },
            bus103: { id: "bus103", name: "🟠 RoyalTravels", type: "Non-AC", departure: "10:30 PM", arrival: "04:00 AM", price: 320, totalSeats: 20 }
        };

        let currentBus = null;
        let selectedSeats = [];
        let takenSeatsMap = {};

        function init() {
            const search = getLS('ft_search');
            if (!search) {
                alert('No search data. Please search again.');
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('routeInfo').innerHTML = `🚍 ${search.from} → ${search.to}`;
            document.getElementById('dateInfo').innerHTML = `📅 ${search.date} | 👥 ${search.passengers} passenger(s)`;

            takenSeatsMap = getLS('ft_takenSeats', {});
            renderBuses(search);
        }

        function renderBuses(search) {
            const container = document.getElementById('busContainer');
            container.innerHTML = '';

            for (let busId in busDatabase) {
                const bus = busDatabase[busId];
                const takenSeats = takenSeatsMap[bus.id] || [];
                
                const card = document.createElement('div');
                card.className = 'bus-card';
                card.innerHTML = `
                    <div class="bus-name">${bus.name}</div>
                    <div class="bus-meta">
                        <span>${bus.type}</span>
                        <span>⏱ ${bus.departure} → ${bus.arrival}</span>
                    </div>
                    <div class="price">₹${bus.price}</div>
                    <div class="seat-grid" id="seats-${bus.id}"></div>
                    <div class="summary">
                        <strong>Selected seats:</strong> <span id="summary-${bus.id}">None</span>
                        <br><strong>Total fare:</strong> ₹<span id="fare-${bus.id}">0</span>
                    </div>
                    <button class="continue-btn" data-busid="${bus.id}">Continue to Payment →</button>
                `;
                
                container.appendChild(card);
                
                // Render seat grid
                const seatGrid = card.querySelector(`#seats-${bus.id}`);
                for (let i = 1; i <= bus.totalSeats; i++) {
                    const seatNo = `S${i}`;
                    const isTaken = takenSeats.includes(seatNo);
                    const seatDiv = document.createElement('div');
                    seatDiv.className = `seat ${isTaken ? 'taken' : 'available'}`;
                    seatDiv.textContent = seatNo;
                    if (!isTaken) {
                        seatDiv.onclick = () => toggleSeat(seatDiv, seatNo, bus.id);
                    }
                    seatGrid.appendChild(seatDiv);
                }
                
                // Attach continue event
                const btn = card.querySelector(`.continue-btn`);
                btn.onclick = () => proceedToPayment(bus, search.passengers);
            }
        }

        function toggleSeat(seatDiv, seatNo, busId) {
            if (seatDiv.classList.contains('taken')) return;
            
            if (selectedSeats.includes(seatNo)) {
                selectedSeats = selectedSeats.filter(s => s !== seatNo);
                seatDiv.classList.remove('selected');
            } else {
                // Limit by passenger count? We'll just allow but payment page will validate
                selectedSeats.push(seatNo);
                seatDiv.classList.add('selected');
            }
            updateSummaryForBus(busId);
        }

        function updateSummaryForBus(busId) {
            const summarySpan = document.getElementById(`summary-${busId}`);
            const fareSpan = document.getElementById(`fare-${busId}`);
            if (summarySpan) {
                summarySpan.innerText = selectedSeats.length ? selectedSeats.join(', ') : 'None';
                const bus = busDatabase[busId];
                const total = selectedSeats.length * bus.price;
                fareSpan.innerText = total;
            }
        }

        function proceedToPayment(bus, passengerCount) {
            if (selectedSeats.length === 0) {
                alert('Please select at least one seat');
                return;
            }
            
            // Check if seats already taken (double check)
            const taken = takenSeatsMap[bus.id] || [];
            const conflict = selectedSeats.some(s => taken.includes(s));
            if (conflict) {
                alert('Some seats were just booked! Please refresh and reselect.');
                window.location.reload();
                return;
            }
            
            const draft = {
                busId: bus.id,
                busName: bus.name,
                busType: bus.type,
                departure: bus.departure,
                arrival: bus.arrival,
                price: bus.price,
                seats: [...selectedSeats],
                passengerCount: passengerCount,
                totalAmount: selectedSeats.length * bus.price,
                bookingId: "FT" + Date.now()
            };
            
            setLS('ft_payment_draft', draft);
            window.location.href = 'payment.html';
        }

        init();
    </script>
</body>
</html>
